name: Cleanup old container versions

on:
  schedule:
    - cron: '0 4 * * 0'  # Sundays at 04:00 UTC
  workflow_dispatch:

jobs:
  purge-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete untagged versions (build cache, orphaned layers)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ethanolmix-calculator
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: 'true'

  purge-sha-tags:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old sha-tagged versions, keep semver/latest/main
        uses: actions/delete-package-versions@v5
        with:
          package-name: ethanolmix-calculator
          package-type: container
          min-versions-to-keep: 10
          ignore-versions: '^(v?\d+(\.\d+)*|latest|main)$'
