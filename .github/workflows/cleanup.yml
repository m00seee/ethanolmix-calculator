name: Cleanup old container versions

on:
  schedule:
    - cron: '0 4 * * 0'  # Sundays at 04:00 UTC
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete untagged & old versions
        uses: snok/container-retention-policy@v3.0.0
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ethanolmix-calculator
          # Keep all version-tagged releases (v*, semver, latest)
          image-tags: '!v* !latest !*.*.* !*.* !main'
          # For everything else (sha tags, untagged), keep only the 10 most recent
          cut-off: 1d
          keep-n-most-recent: 10
          tag-selection: both
